            maxLength: 18
          description: Material number
        - name: werks
          in: query
          required: true
          schema:
            type: string
            maxLength: 4
          description: Plant
        - name: lgort
          in: query
          required: false
          schema:
            type: string
            maxLength: 4
          description: Storage location (optional)
      responses:
        "200":
          description: Stock found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockResponse"
        "400":
          description: Missing required query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No stock data found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sap/bc/zzapi/mes/po_items:
    get:
      operationId: getPoItems
      summary: Purchase order line items
      description: Returns PO line items (EKPO) with delivery schedule (EKET) for a given PO number.
      parameters:
        - $ref: "#/components/parameters/SapClient"
        - name: ebeln
          in: query
          required: true
          schema:
            type: string
            maxLength: 10
          description: Purchasing document number
      responses:
        "200":
          description: PO items found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoItemsResponse"
        "400":
          description: Missing required query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PO not found or has no items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sap/bc/zzapi/mes/routing:
    get:
      operationId: getRouting
      summary: Routing / recipe
      description: Returns operation sequence and standard times for a material at a plant.
      parameters:
        - $ref: "#/components/parameters/SapClient"
        - name: matnr
          in: query
          required: true
          schema:
            type: string
            maxLength: 18
          description: Material number
        - name: werks
          in: query
          required: true
          schema:
            type: string
            maxLength: 4
          description: Plant
      responses:
        "200":
          description: Routing found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutingResponse"
        "400":
          description: Missing required query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Routing not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sap/bc/zzapi/mes/wc:
    get:
      operationId: getWorkCenter
      summary: Work center
      description: Returns work center details including capacity and cost center.
      parameters:
        - $ref: "#/components/parameters/SapClient"
        - name: arbpl
          in: query
          required: true
          schema:
            type: string
            maxLength: 8
          description: Work center
        - name: werks
          in: query
          required: true
          schema:
            type: string
            maxLength: 4
          description: Plant
      responses:
        "200":
          description: Work center found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkCenterResponse"
        "400":
          description: Missing required query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Work center not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

