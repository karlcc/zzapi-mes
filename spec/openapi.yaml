components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SapClient:
      name: sap-client
      in: query
      required: true
      schema:
        type: integer
        example: 200
      description: SAP client number

  schemas:
    PingResponse:
      type: object
      required: [ok, sap_time]
      properties:
        ok:
          type: boolean
          example: true
        sap_time:
          type: string
          pattern: "^[0-9]{14}$"
          description: "YYYYMMDDHHMMSS"
          example: "20260422163000"

    PoResponse:
      type: object
      required: [ebeln, aedat, lifnr, eindt]
      properties:
        ebeln:
          type: string
          maxLength: 10
          description: Purchasing document number
          example: "3010000608"
        aedat:
          type: string
          pattern: "^[0-9]{8}$"
          description: "Change date (YYYYMMDD)"
          example: "20170306"
        lifnr:
          type: string
          maxLength: 10
          description: Vendor account number
          example: "0000500340"
        eindt:
          type: string
          pattern: "^[0-9]{8}$"
          description: "Delivery date (YYYYMMDD)"
          example: "20170630"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "PO not found"
        original_status:
          type: integer
          description: Original HTTP status from a prior idempotency-checked request (present on 409 duplicate responses only)
          example: 201

    TokenResponse:
      type: object
      required: [token, expires_in]
      properties:
        token:
          type: string
          description: JWT bearer token with claims {key_id, scopes, iat, exp, rate_limit_per_min}
        expires_in:
          type: integer
          description: Token lifetime in seconds (default 900, configurable via HUB_JWT_TTL_SECONDS)
          example: 900

    HealthzResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          example: true
        error:
          type: string
          description: Error message when ok is false (e.g. "database unreachable")
        sap:
          type: string
          description: SAP reachability status when check=sap query param is present (e.g. "reachable")

    # -----------------------------------------------------------------
    # Phase 5A schemas
    # -----------------------------------------------------------------

    ProdOrderResponse:
      type: object
      required: [aufnr, auart, werks, matnr, gamng, gstrp, gltrp]
      properties:
        aufnr:
          type: string
          maxLength: 12
          description: Production order number
          example: "1000000"
        auart:
          type: string
          maxLength: 4
          description: Order type
          example: "PP01"
        werks:
          type: string
          maxLength: 4
          description: Plant
          example: "1000"
        matnr:
          type: string
          maxLength: 18
          description: Material number
          example: "10000001"
        gamng:
          type: number
          description: Total order quantity
          example: 1000
        gmein:
          type: string
          maxLength: 3
          description: Base unit of measure
          example: "EA"
        gstrp:
          type: string
          pattern: "^[0-9]{8}$"
          description: Scheduled start date (YYYYMMDD)
          example: "20260401"
        gltrp:
          type: string
          pattern: "^[0-9]{8}$"
          description: Scheduled finish date (YYYYMMDD)
          example: "20260415"
        operations:
          type: array
          description: Order operations
          items:
            $ref: "#/components/schemas/ProdOrderOperation"
        components:
          type: array
          description: Component reservations
          items:
            $ref: "#/components/schemas/ProdOrderComponent"

    ProdOrderOperation:
      type: object
      required: [vornr, ltxa1]
      properties:
        vornr:
          type: string
          maxLength: 4
          description: Operation number
          example: "0010"
        ltxa1:
          type: string
          description: Operation description
          example: "Turning"
        arbpl:
          type: string
          maxLength: 8
          description: Work center
          example: "TURN1"
        vgwrt:
          type: number
          description: Standard value (hours)
          example: 2.5

    ProdOrderComponent:
      type: object
      required: [matnr, bdmenge]
      properties:
        matnr:
          type: string
          maxLength: 18
          description: Component material number
          example: "20000001"
        bdmenge:
          type: number
          description: Required quantity
          example: 500
        meins:
          type: string
          maxLength: 3
          description: Unit of measure
          example: "EA"
        werks:
          type: string
          maxLength: 4
          description: Plant
          example: "1000"

    MaterialResponse:
      type: object
      required: [matnr, mtart, meins]
      properties:
        matnr:
          type: string
          maxLength: 18
          description: Material number
          example: "10000001"
        mtart:
          type: string
          maxLength: 4
          description: Material type
          example: "FERT"
        meins:
          type: string
          maxLength: 3
          description: Base unit of measure
          example: "EA"
        maktx:
          type: string
          description: Material description
          example: "Finished product A"
        werks:
          type: string
          maxLength: 4
          description: Plant (if plant-specific data requested)
          example: "1000"
        dispo:
          type: string
          maxLength: 3
          description: MRP controller
          example: "001"

    StockResponse:
      type: object
      required: [matnr, werks]
      properties:
        matnr:
          type: string
          maxLength: 18
          description: Material number
          example: "10000001"
        werks:
          type: string
          maxLength: 4
          description: Plant
          example: "1000"
        items:
          type: array
          description: Stock by storage location/batch
          items:
            $ref: "#/components/schemas/StockItem"

    StockItem:
      type: object
      required: [lgort, clabs]
      properties:
        lgort:
          type: string
          maxLength: 4
          description: Storage location
          example: "0001"
        charg:
          type: string
          maxLength: 10
          description: Batch number
          example: "BATCH001"
        clabs:
          type: number
          description: Unrestricted stock
          example: 250
        avail_qty:
          type: number
          description: Available quantity (ATP)
          example: 200

    PoItemsResponse:
      type: object
      required: [ebeln, items]
      properties:
        ebeln:
          type: string
          maxLength: 10
          description: Purchasing document number
          example: "3010000608"
        items:
          type: array
          description: PO line items
          items:
            $ref: "#/components/schemas/PoItem"

    PoItem:
      type: object
      required: [ebelp, matnr, menge, meins]
      properties:
        ebelp:
          type: string
          maxLength: 5
          description: Item number
          example: "00010"
        matnr:
          type: string
          maxLength: 18
          description: Material number
          example: "10000001"
        txz01:
          type: string
          description: Short text
          example: "Raw material X"
        menge:
          type: number
          description: Order quantity
          example: 100
        meins:
          type: string
          maxLength: 3
          description: Unit of measure
          example: "EA"
        netpr:
          type: number
          description: Net price per unit
          example: 12.50
        eindt:
          type: string
          pattern: "^[0-9]{8}$"
          description: Delivery date (YYYYMMDD)
          example: "20170630"

    # -----------------------------------------------------------------
    # Phase 5A remaining schemas (routing + work center)
    # -----------------------------------------------------------------

    RoutingOperationSchema:
      type: object
      required: [vornr, ltxa1]
      properties:
        vornr:
          type: string
          maxLength: 4
          description: Operation number
          example: "0010"
        ltxa1:
          type: string
          description: Operation text
          example: "Turning"
        arbpl:
          type: string
          maxLength: 8
          description: Work center
          example: "TURN1"
        vgwrt:
          type: number
          description: Standard value (hours)
          example: 2.5
        meinh:
          type: string
          maxLength: 3
          description: Unit for standard value
          example: "H"

    RoutingResponse:
      type: object
      required: [matnr, werks, plnnr, operations]
      properties:
        matnr:
          type: string
          maxLength: 18
          description: Material number
          example: "10000001"
        werks:
          type: string
          maxLength: 4
          description: Plant
          example: "1000"
        plnnr:
          type: string
          maxLength: 8
          description: Task list group
          example: "50000123"
        plnal:
          type: string
          maxLength: 2
          description: Group counter
          example: "01"
        operations:
          type: array
          description: Operation sequence
          items:
            $ref: "#/components/schemas/RoutingOperationSchema"

    WorkCenterResponse:
      type: object
      required: [arbpl, werks]
      properties:
        arbpl:
          type: string
          maxLength: 8
          description: Work center
          example: "TURN1"
        werks:
          type: string
          maxLength: 4
          description: Plant
          example: "1000"
        ktext:
          type: string
          description: Work center description
          example: "CNC Turning Center"
        steus:
          type: string
          maxLength: 4
          description: Control key
          example: "PP01"
        kapid:
          type: string
          maxLength: 8
          description: Capacity ID
          example: "10000001"
        kostl:
          type: string
          maxLength: 10
          description: Cost center
          example: "10001000"

    # -----------------------------------------------------------------
    # Phase 5B schemas — write-back
    # -----------------------------------------------------------------

    ConfirmationRequest:
      type: object
      required: [orderid, operation, yield]
      properties:
        orderid:
          type: string
          minLength: 1
          maxLength: 12
          description: Production order number
          example: "1000000"
        operation:
          type: string
          minLength: 1
          maxLength: 4
          description: Operation number
          example: "0010"
        yield:
          type: number
          minimum: 1
