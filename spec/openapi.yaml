openapi: 3.0.3
info:
  title: ZZAPI MES
  description: SAP ICF REST handlers for MES integration on SAP_BASIS 700
  version: 0.1.0
  license:
    name: UNLICENSED
  x-cors: |
    The hub supports CORS (hono/cors middleware). Configure via HUB_CORS_ORIGIN env var:
    - Unset (default): CORS disabled — no Access-Control headers sent
    - Comma-separated list: restrict to specific origins (e.g. "https://app.example.com,https://admin.example.com")
    - "*" is REJECTED at startup (exit 1) — wildcard origins with credentials is a CSRF vector and browsers reject it anyway
    - Empty string: same as unset — CORS disabled
    Preflight (OPTIONS) returns 204 with Access-Control-Allow-Methods: GET, POST.
    Exposed headers: X-Request-ID, Retry-After.

servers:
  - url: http://sapdev.fastcell.hk:8000
    description: sapdev (Phase 1, direct SAP access)
  - url: http://localhost:8080
    description: zzapi-mes hub (Phase 3)

security: []

paths:
  /sap/bc/zzapi/mes/ping:
    get:
      operationId: ping
      summary: Health check
      description: Lightweight probe — no database access, safe for monitoring.
      parameters:
        - $ref: "#/components/parameters/SapClient"
      responses:
        "200":
          description: System reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "405":
          description: HTTP method not allowed (only GET)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sap/bc/zzapi/mes/handler:
    get:
      operationId: getPo
      summary: Purchase order info
      description: Returns PO header + delivery date for a given ebeln. JSON matches legacy BSP output byte-for-byte.
      parameters:
        - $ref: "#/components/parameters/SapClient"
        - name: ebeln
          in: query
          required: true
          schema:
            type: string
            maxLength: 10
          description: Purchasing document number
      responses:
        "200":
          description: PO found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoResponse"
        "404":
          description: PO not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: HTTP method not allowed (only GET)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # -----------------------------------------------------------------------
  # Hub-specific endpoints (Phase 3)
  # These only exist on the hub server, not on SAP directly.
  # -----------------------------------------------------------------------

  /auth/token:
    post:
      operationId: createToken
      summary: Obtain a JWT bearer token
      description: Exchange an API key (format `<key_id>.<secret>`) for a short-lived JWT. The JWT carries `key_id`, `scopes`, `iat`, `exp`, and `rate_limit_per_min` claims.
      security: []  # No auth required for token issuance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key:
                  type: string
                  description: "API key in format: <key_id>.<secret>"
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: |
            Invalid, unknown, or revoked API key.
            The hub emits a structured `auth_failure` JSON log line (type, ip, key_id_prefix, req_id, t)
            for forensic analysis. Only the key_id prefix (before the dot) is logged — never the secret component.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: Request body too large (max 1 MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Auth rate limit exceeded
          headers:
            retry-after:
              schema:
                type: integer
              description: Seconds until next request is allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthz
      summary: Hub health check
      description: Lightweight probe — checks database connectivity. Add `?check=sap` to also verify SAP reachability (cached for 30s).
      security: []
      parameters:
        - name: check
          in: query
          required: false
          schema:
            type: string
            enum: [sap]
          description: Optional SAP reachability check (pings SAP ICF handler, 5s timeout, result cached 30s)
      responses:
        "200":
          description: Hub is running (and SAP reachable if check=sap)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
        "503":
          description: Database unreachable or SAP unreachable (when check=sap)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Hub mirrors the SAP endpoints at /ping and /po/:ebeln
  /ping:
    get:
      operationId: hubPing
      summary: Health check via hub
      description: Proxies to the SAP ping handler. Requires Bearer token with `ping` scope.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: System reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient scope (requires 'ping')
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          headers:
            retry-after:
              schema:
                type: integer
              description: Seconds until next request is allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SAP upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: SAP request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /po/{ebeln}:
    get:
      operationId: hubGetPo
      summary: Purchase order info via hub
      description: Proxies to the SAP PO handler. Requires Bearer token with `po` scope.
      security:
        - bearerAuth: []
      parameters:
        - name: ebeln
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 10
            pattern: "^[A-Za-z0-9]+$"
          description: Purchasing document number
      responses:
        "200":
          description: PO found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PoResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient scope (requires 'po')
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Invalid path parameter (exceeds maxLength)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: PO not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded
          headers:
            retry-after:
              schema:
                type: integer
              description: Seconds until next request is allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: SAP upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: SAP request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /metrics:
    get:
      operationId: metrics
      summary: Prometheus metrics
      description: Exposes hub metrics in Prometheus text format. Localhost-only access.
      security: []
      responses:
        "200":
          description: Prometheus metrics
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Forbidden (non-localhost access)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # -----------------------------------------------------------------------
  # Phase 5A — MES business endpoints (read-only)
  # -----------------------------------------------------------------------

  /sap/bc/zzapi/mes/prod_order:
    get:
      operationId: getProdOrder
      summary: Production order detail
      description: Returns production order header, operations, and component reservations.
      parameters:
        - $ref: "#/components/parameters/SapClient"
        - name: aufnr
          in: query
          required: true
          schema:
            type: string
            maxLength: 12
          description: Production order number
      responses:
        "200":
          description: Production order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProdOrderResponse"
        "400":
          description: Missing required query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sap/bc/zzapi/mes/material:
    get:
      operationId: getMaterial
      summary: Material master
      description: Returns material general + plant-level data and description.
      parameters:
        - $ref: "#/components/parameters/SapClient"
        - name: matnr
          in: query
          required: true
          schema:
            type: string
            maxLength: 18
          description: Material number
        - name: werks
          in: query
          required: false
          schema:
            type: string
            maxLength: 4
          description: Plant (optional, for plant-specific data)
      responses:
        "200":
          description: Material found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialResponse"
        "400":
