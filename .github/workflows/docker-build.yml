name: docker-build

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - apps/hub/**
      - packages/core/**
      - packages/sdk/**
      - packages/cli/**
      - spec/**
      - .github/workflows/docker-build.yml
  workflow_dispatch:

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Docker build verification
        run: docker build -t zzapi-mes-hub-ci . --target runner
