name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: corepack enable pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: sudo apt-get install -y --no-install-recommends g++
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm spec:gen
      - run: git diff --exit-code
      - run: pnpm test
      - name: Validate OpenAPI spec
        run: npx @redocly/cli lint spec/openapi.yaml --skip-rule security-overwrite-to-more-specific || true
      - name: Docker build verification
        run: docker build -t zzapi-mes-hub-ci . --target runner
      - name: Dependency audit
        run: pnpm audit --audit-level moderate || true
