name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: sudo apt-get install -y --no-install-recommends g++
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm -r exec tsc --noEmit
      - run: pnpm spec:gen
      - run: git diff --exit-code
      - run: pnpm test
      - name: Test coverage (Node 22 only)
        if: matrix.node-version == 22
        run: |
          pnpm --filter @zzapi-mes/hub exec node --test --experimental-test-coverage src/test/rate-limit.test.ts 2>&1 || true
      - name: Validate OpenAPI spec
      - name: Validate OpenAPI spec
        run: npx @redocly/cli lint spec/openapi.yaml --skip-rule security-overwrite-to-more-specific || true
      - name: Dependency audit
        run: pnpm audit --audit-level moderate || true
